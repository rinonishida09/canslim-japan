name: Daily CANSLIM Analysis

on:
  schedule:
    - cron: '45 6 * * 1-5'   # 毎営業日 15:45 JST (= 06:45 UTC)
  workflow_dispatch:           # 手動実行ボタン

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: ライブラリインストール
        run: pip install -r requirements.txt

      - name: CANSLIM 分析実行
        run: python canslim_analyzer.py

      - name: index.html を最新レポートからコピー
        run: |
          LATEST=$(ls trade_report_*.html 2>/dev/null | sort -r | head -1)
          if [ -n "$LATEST" ]; then
            cp "$LATEST" index.html
            echo "index.html を作成: $LATEST"
          else
            echo "HTMLファイルが見つかりません"
          fi

      - name: HTMLレポートをコミット＆プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet && echo "変更なし" || git commit -m "Daily report $(date +%Y-%m-%d)"
          git push
