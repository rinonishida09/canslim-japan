name: Daily CANSLIM Analysis

on:
  schedule:
    - cron: '45 6 * * 1-5'   # 毎営業日 15:45 JST (= 06:45 UTC)
  workflow_dispatch:           # 手動実行ボタン

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: ライブラリインストール
        run: pip install -r requirements.txt

      - name: CANSLIM 分析実行
        run: python canslim_analyzer.py

      - name: 生成ファイル確認
        run: ls -la *.html *.json 2>/dev/null || echo "HTMLファイルなし"

      - name: HTMLレポートをコミット＆プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git status
          git diff --staged --quiet && echo "変更なし" || git commit -m "Daily report $(date +%Y-%m-%d)"
          git push
